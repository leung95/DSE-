name: Build Cross-Platform Executables

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允許手動觸發

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows EXE
        run: |
          python -m PyInstaller --onefile --windowed --clean --name "作文小工具" main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: essay-tool-windows
          path: dist/作文小工具.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS APP
        run: |
          python -m PyInstaller --windowed --clean --name "作文小工具" --osx-bundle-identifier "com.example.essaytool" main.py

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: essay-tool-macos
          path: dist/作文小工具.app

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux Executable
        run: |
          python -m PyInstaller --onefile --windowed --clean --name "essay_tool" main.py

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: essay-tool-linux
          path: dist/essay_tool
